name: ATAN - Build and Test

on:
  push:
    branches: [ master ]
    paths:
      - 'atan/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/atan-build-and-test.yml'
  pull_request:
    paths:
      - 'atan/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/atan-build-and-test.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Use git CLI for fetching (required for SSH auth with private repos in isolated env)
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  atan-packages-build-test:
    name: "ATAN Packages - Build, Test & Binaries"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust environment
        run: |
          CI_CACHE="/tmp/ci-cache/${{ runner.name }}"
          echo "CARGO_TARGET_DIR=${CI_CACHE}/cargo-target" >> $GITHUB_ENV
          echo "CARGO_HOME=${CI_CACHE}/cargo-home" >> $GITHUB_ENV
          echo "RUSTUP_HOME=${CI_CACHE}/rustup" >> $GITHUB_ENV
          mkdir -p "${CI_CACHE}/cargo-target" "${CI_CACHE}/cargo-home" "${CI_CACHE}/rustup"
          echo "${CI_CACHE}/cargo-home/bin" >> $GITHUB_PATH

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Detect ATAN packages
        run: |
          echo "ATAN_PACKAGES=$(cargo metadata --no-deps --format-version 1 \
                | jq -r '
                  .packages
                  | map(select(.manifest_path | contains("/atan/")))
                  | map(.name)
                  | join(" ")
                ')" >> $GITHUB_ENV


      - name: Build ATAN crates
        run: |
          export CARGO_BUILD_JOBS=$(nproc)
          for pkg in $ATAN_PACKAGES; do
            echo "Building $pkg..."
            cargo build -p $pkg --release --verbose
          done

      - name: Run ATAN tests
        run: |
          export CARGO_TEST_THREADS=$(nproc)
          for pkg in $ATAN_PACKAGES; do
            echo "Testing $pkg..."
            cargo test -p $pkg --release --verbose
          done

